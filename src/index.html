<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkForge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Left tool rail -->
    <aside id="toolrail">
      <div class="brand">◈</div>
      <button class="tool" data-tool="brush" title="Brush (B)">✎</button>
      <button class="tool" data-tool="eraser" title="Eraser (E)">⌫</button>
      <button class="tool" data-tool="smudge" title="Smudge (S)">👆</button>
      <button class="tool" data-tool="liquify" title="Liquify (W)">🌀</button>
      <button class="tool" data-tool="fill" title="Fill (G)">🪣</button>
      <button class="tool" data-tool="eyedropper" title="Eyedropper (I)">💧</button>
      <button class="tool" data-tool="line" title="Line (L)">╱</button>
      <button class="tool" data-tool="rect" title="Rectangle (R)">▭</button>
      <button class="tool" data-tool="ellipse" title="Ellipse (O)">◯</button>
      <button class="tool" data-tool="text" title="Text (T)">T</button>
      <button class="tool" data-tool="select" title="Select (M)">⬚</button>
      <button class="tool" data-tool="move" title="Move Layer (V)">✥</button>
      <button class="tool" data-tool="pan" title="Pan (Space)">✋</button>
      <div class="rail-spacer"></div>
      <button class="tool ghost" id="btn-undo" title="Undo (Ctrl+Z)">↺</button>
      <button class="tool ghost" id="btn-redo" title="Redo (Ctrl+Shift+Z)">↻</button>
    </aside>

    <!-- Top options bar -->
    <header id="topbar">
      <div class="group">
        <label>Color</label>
        <input type="color" id="color" value="#1a1a1a" />
      </div>
      <div class="group">
        <label>Preset</label>
        <select id="preset">
          <option value="">Custom</option>
          <option value="Pencil">Pencil</option>
          <option value="Ink">Ink Pen</option>
          <option value="Marker">Marker</option>
          <option value="Airbrush">Airbrush</option>
          <option value="Soft">Soft Round</option>
        </select>
      </div>
      <div class="group">
        <label>Size <span id="size-val">12</span></label>
        <input type="range" id="size" min="1" max="400" value="12" />
      </div>
      <div class="group">
        <label>Opacity <span id="opacity-val">100</span>%</label>
        <input type="range" id="opacity" min="1" max="100" value="100" />
      </div>
      <div class="group">
        <label>Hardness <span id="hardness-val">80</span>%</label>
        <input type="range" id="hardness" min="0" max="100" value="80" />
      </div>
      <div class="group toggle">
        <label><input type="checkbox" id="pressure" checked /> Pen pressure</label>
      </div>
      <div class="group grow"></div>
      <div class="group">
        <span id="zoom-label" class="pill">100%</span>
        <button id="btn-fit" class="btn">Fit</button>
      </div>
      <div class="group">
        <button id="btn-filters" class="btn">Filters</button>
        <button id="btn-effects" class="btn">Effects</button>
        <button id="btn-animate" class="btn">Animate</button>
        <button id="btn-ai" class="btn">AI ✦</button>
      </div>
      <div class="group">
        <button id="btn-open" class="btn">Open</button>
        <button id="btn-save" class="btn">Save</button>
        <button id="btn-new" class="btn">New</button>
        <button id="btn-export" class="btn primary">Export PNG</button>
      </div>
    </header>

    <!-- Canvas stage -->
    <main id="stage">
      <div id="canvas-wrap">
        <canvas id="view"></canvas>
      </div>
      <div id="cursor-ring"></div>
    </main>

    <!-- Right layers panel -->
    <aside id="layers-panel">
      <div class="panel-head">
        <span>Layers</span>
        <div class="panel-actions">
          <button id="btn-add-layer" title="Add layer">＋</button>
          <button id="btn-del-layer" title="Delete layer">🗑</button>
        </div>
      </div>
      <div class="layer-opacity">
        <label>Layer opacity <span id="layer-op-val">100</span>%</label>
        <input type="range" id="layer-opacity" min="0" max="100" value="100" />
      </div>
      <div class="layer-blend">
        <label>Blend</label>
        <select id="blend-mode">
          <option value="source-over">Normal</option>
          <option value="multiply">Multiply</option>
          <option value="screen">Screen</option>
          <option value="overlay">Overlay</option>
          <option value="darken">Darken</option>
          <option value="lighten">Lighten</option>
          <option value="color-dodge">Color Dodge</option>
          <option value="difference">Difference</option>
          <option value="hue">Hue</option>
          <option value="color">Color</option>
        </select>
      </div>
      <ul id="layer-list"></ul>
    </aside>

    <section id="timeline" class="hidden">
      <div class="tl-controls">
        <button id="tl-play" title="Play / Stop">▶</button>
        <button id="tl-add" title="Add frame">＋</button>
        <button id="tl-dup" title="Duplicate frame">⎘</button>
        <button id="tl-del" title="Delete frame">🗑</button>
        <label class="tl-onion"><input type="checkbox" id="tl-onion" /> Onion</label>
        <label>FPS <input type="number" id="tl-fps" value="12" min="1" max="60" /></label>
        <div class="tl-grow"></div>
        <button id="tl-gif" class="btn">Export GIF</button>
        <button id="tl-webm" class="btn">Export WebM</button>
      </div>
      <ul id="frame-list"></ul>
    </section>

    <footer id="statusbar">
      <span id="status-tool">Brush</span>
      <span id="status-pos">0, 0</span>
      <span id="status-doc">—</span>
      <span id="status-frame"></span>
    </footer>
  </div>

  <!-- New canvas dialog -->
  <dialog id="new-dialog">
    <form method="dialog">
      <h3>New Canvas</h3>
      <div class="row"><label>Width</label><input type="number" id="nc-w" value="1920" min="1" max="8192" /></div>
      <div class="row"><label>Height</label><input type="number" id="nc-h" value="1080" min="1" max="8192" /></div>
      <div class="row"><label>Background</label>
        <select id="nc-bg">
          <option value="#ffffff">White</option>
          <option value="transparent">Transparent</option>
          <option value="#1e1e22">Dark</option>
        </select>
      </div>
      <div class="dialog-actions">
        <button value="cancel" class="btn">Cancel</button>
        <button value="ok" class="btn primary" id="nc-create">Create</button>
      </div>
    </form>
  </dialog>

  <!-- Text tool dialog -->
  <dialog id="text-dialog">
    <form method="dialog">
      <h3>Add Text</h3>
      <div class="row full"><textarea id="tx-text" rows="3" placeholder="Type your text…"></textarea></div>
      <div class="row"><label>Font</label>
        <select id="tx-font">
          <option value="-apple-system, 'Segoe UI', sans-serif">Sans</option>
          <option value="Georgia, 'Times New Roman', serif">Serif</option>
          <option value="Menlo, Consolas, monospace">Mono</option>
          <option value="'Comic Sans MS', cursive">Comic</option>
          <option value="Impact, sans-serif">Impact</option>
        </select>
      </div>
      <div class="row"><label>Size</label><input type="number" id="tx-size" value="72" min="6" max="800" /></div>
      <div class="row"><label>Bold</label><input type="checkbox" id="tx-bold" /></div>
      <div class="dialog-actions">
        <button value="cancel" class="btn">Cancel</button>
        <button value="ok" class="btn primary" id="tx-ok">Add</button>
      </div>
    </form>
  </dialog>

  <!-- Filters dialog -->
  <dialog id="filters-dialog">
    <form method="dialog">
      <h3>Filters <span class="dim">· active layer</span></h3>
      <div class="chip-grid">
        <button type="button" class="chip" data-filter="grayscale">Grayscale</button>
        <button type="button" class="chip" data-filter="invert">Invert</button>
        <button type="button" class="chip" data-filter="sepia">Sepia</button>
        <button type="button" class="chip" data-filter="blur">Blur</button>
        <button type="button" class="chip" data-filter="sharpen">Sharpen</button>
        <button type="button" class="chip" data-filter="brighten">Brighten</button>
        <button type="button" class="chip" data-filter="darken">Darken</button>
        <button type="button" class="chip" data-filter="contrast-up">Contrast +</button>
        <button type="button" class="chip" data-filter="contrast-down">Contrast −</button>
        <button type="button" class="chip" data-filter="saturate">Saturate</button>
        <button type="button" class="chip" data-filter="desaturate">Desaturate</button>
        <button type="button" class="chip" data-filter="hue">Hue Shift</button>
      </div>
      <div class="row"><label>Amount <span id="fx-amt-val">100</span>%</label>
        <input type="range" id="fx-amt" min="0" max="200" value="100" /></div>
      <div class="dialog-actions"><button value="cancel" class="btn">Close</button></div>
    </form>
  </dialog>

  <!-- Effects dialog -->
  <dialog id="effects-dialog">
    <form method="dialog">
      <h3>Layer Effects <span class="dim">· active layer</span></h3>
      <div class="chip-grid">
        <button type="button" class="chip" data-effect="shadow">Drop Shadow</button>
        <button type="button" class="chip" data-effect="glow">Outer Glow</button>
        <button type="button" class="chip" data-effect="stroke">Stroke</button>
      </div>
      <div class="row"><label>Size <span id="ef-size-val">12</span>px</label>
        <input type="range" id="ef-size" min="1" max="60" value="12" /></div>
      <div class="row"><label>Color</label><input type="color" id="ef-color" value="#000000" /></div>
      <div class="dialog-actions"><button value="cancel" class="btn">Close</button></div>
    </form>
  </dialog>

  <!-- AI image generation dialog -->
  <dialog id="ai-dialog">
    <form method="dialog">
      <h3>AI Image <span class="dim">· adds a new layer</span></h3>
      <div class="row"><label>Provider</label>
        <select id="ai-provider">
          <option value="gemini">Google Gemini</option>
          <option value="replicate">Replicate</option>
        </select>
      </div>
      <div class="row"><label>API Key</label><input type="password" id="ai-key" placeholder="paste your key (saved locally)" /></div>
      <div class="row"><label>Model</label><input type="text" id="ai-model" placeholder="(default)" /></div>
      <div class="row full"><textarea id="ai-prompt" rows="3" placeholder="Describe the image to generate…"></textarea></div>
      <div class="ai-status" id="ai-status"></div>
      <div class="dialog-actions">
        <button value="cancel" class="btn">Close</button>
        <button type="button" class="btn primary" id="ai-generate">Generate</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="renderer/app.js"></script>
</body>
</html>
